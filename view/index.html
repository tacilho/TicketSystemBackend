<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketSystem - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="login-bg position-relative vh-100 d-flex justify-content-center align-items-center">

    <div class="login-overlay"></div>

    <div class="card bg-white border-0 login-card p-4 p-xxl-5">
        
        <div class="d-flex flex-column align-items-center mb-4 pb-2">
            <div class="d-flex align-items-center">
                <i class="fa-solid fa-tags logo-icon text-brand me-2"></i>
                <div class="lh-sm text-center">
                    <div class="fs-4 text-brand lh-1"><strong>Ticket</strong>System</div>
                    <div class="text-secondary mt-1" style="font-size: 0.75rem;">Administrator</div>
                </div>
            </div>
        </div>

        <h4 class="text-center fw-bold mb-4 pb-2 text-dark">Login</h4>

        <form onsubmit="realizarLogin(event)">
            
            <div class="mb-4">
                <label class="form-label fw-semibold text-dark mb-1" style="font-size: 0.8rem;">Usuário:</label>
                <input type="text" class="form-control login-input" placeholder="Insira seu usuário..." required>
            </div>

            <div class="mb-5">
                <label class="form-label fw-semibold text-dark mb-1" style="font-size: 0.8rem;">Senha:</label>
                <input type="password" class="form-control login-input" placeholder="Insira sua senha..." required>
            </div>

            <div class="d-flex justify-content-center mb-4">
                <button type="submit" class="btn btn-brand btn-login shadow-sm fw-bold fs-6">Entrar</button>
            </div>

            <div class="text-center mt-2" style="font-size: 0.8rem;">
                <span class="text-dark fw-bold">Ainda não possui uma conta?</span><br>
                <a href="#" class="text-primary text-decoration-none mt-1 d-inline-block">Cadastre-se aqui</a>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function realizarLogin(event) {
            event.preventDefault(); // Evita o recarregamento da página
            // Simulação de login - redireciona para o dashboard
            window.location.href = "home.html";
        }
    </script>
</body>
</html>
