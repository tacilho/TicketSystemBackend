<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketSystem - Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <script src="../methods/pageManager.js"></script>

</head>
<body class="overflow-hidden vh-100">

    <div class="d-flex h-100">
        <aside class="sidebar d-flex flex-column bg-white">
            <div class="brand-area d-flex align-items-center p-4" style="height: 90px;">
                <i class="fa-solid fa-tags logo-icon text-brand me-2"></i>
                <div class="lh-sm">
                    <div class="fs-5 text-brand"><strong>Ticket</strong>System</div>
                    <div class="text-secondary" style="font-size: 0.75rem;">Administrator</div>
                </div>
            </div>

            <nav class="nav flex-column p-3 gap-2 gap-xxl-3">
                <a href="home.html" class="nav-link nav-link-custom active d-flex align-items-center p-3 shadow-sm">
                    <i class="fa-solid fa-border-all fs-5 me-2"></i> Dashboard
                </a>
                <a href="tickets.html" class="nav-link nav-link-custom d-flex align-items-center p-3">
                    <i class="fa-solid fa-ticket-alt fs-5 me-2"></i> Tickets
                </a>
                <a href="#" class="nav-link nav-link-custom d-flex align-items-center p-3" data-nivel="operator" data-nivel="admin">
                    <i class="fa-solid fa-chart-line fs-5 me-2"></i> Relatórios
                </a>
                <a href="#" class="nav-link nav-link-custom d-flex align-items-center p-3" data-nivel="admin">
                    <i class="fa-solid fa-gear fs-5 me-2"></i> Configurações
                </a>
            </nav>
        </aside>

        <div class="flex-grow-1 d-flex flex-column bg-white">
            <header class="top-header d-flex justify-content-end align-items-center px-4" style="height: 90px;">
                <div class="d-flex gap-3">
                    <button class="btn btn-brand px-4 shadow-sm" onclick="abrirTicket()">Abrir Ticket</button>
                    <button class="btn btn-light border bg-light d-flex align-items-center gap-2 px-3 shadow-sm fw-medium">
                        <i class="fa-regular fa-user-circle fs-5 text-secondary"></i> Meu Perfil
                    </button>
                </div>
            </header>

            <main class="dashboard-content flex-grow-1 p-4 p-xxl-5 overflow-auto">
                <div class="d-flex justify-content-end align-items-center mb-4 mb-xxl-5">
                    <span class="fw-bold me-2" style="font-size: 0.85rem;">Relatório por:</span>
                    <select class="form-select w-auto filter-select shadow-sm" id="relatorioFiltro">
                        <option value="tipo">Tipo de Atendimento</option>
                        <option value="data">Data de Criação</option>
                    </select>
                </div>

                <div class="d-flex flex-column align-items-end gap-3 gap-xxl-4">
                    <div class="card border border-light shadow-sm stat-card">
                        <div class="card-body d-flex align-items-center gap-4 p-4">
                            <span class="stat-value text-brand">XX</span>
                            <span class="stat-label text-dark">Tickets<br>Abertos</span>
                        </div>
                    </div>

                    <div class="card border border-light shadow-sm stat-card">
                        <div class="card-body d-flex align-items-center gap-4 p-4">
                            <span class="stat-value text-brand">YY</span>
                            <span class="stat-label text-dark">Tickets<br>Pendentes</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

</body>
</html>
