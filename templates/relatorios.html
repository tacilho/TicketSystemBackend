<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{url_for('static', filename='styles.css' )}}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <script src="{{ url_for('static' , filename='pageManager.js')}}"></script>
  <script src="{{ url_for('static' , filename='tickets.js')}}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <title>Relatórios</title>
</head>
<body>
  <div class="layout-container">
      
      <div class="brand-area">
          <i class="fa-solid fa-tags logo-icon"></i>
          <div class="brand-text-container">
              <div class="brand-title"><strong>Ticket</strong>System</div>
              <div class="brand-subtitle">Administrator</div>
          </div>
          <button class="btn-toggle-sidebar" onclick="toggleSidebar()" title="Recolher Menu">
              <i class="fa-solid fa-chevron-left" id="toggleIcon"></i>
          </button>
      </div>

      <header class="top-header">
          <button class="btn-green" onclick="abrirTicket()">Abrir Ticket</button>
          <button class="btn-profile">
              <i class="fa-regular fa-user-circle"></i>
              Meu Perfil
          </button>
      </header>

      <nav class="sidebar">
          <a href="{{ url_for('home') }}" class="nav-item" data-nivel="operator">
              <i class="fa-solid fa-border-all"></i>
              Home
          </a>
          <a href="{{ url_for('tickets') }}" class="nav-item">
              <i class="fa-solid fa-ticket-alt"></i>
              Tickets
          </a>
          <a href="{{ url_for('relatorios') }}" class="nav-item active" data-nivel="operator">
              <i class="fa-solid fa-chart-line"></i>
              Relatórios
          </a>
           <a href="{{ url_for('cadastros') }}" class="nav-item" data-nivel="admin">
                  <i class="fa-solid fa-folder-plus"></i> Cadastros
          </a>
          <a href="/logout" class="btn-logout-sidebar">
              <i class="fa-solid fa-right-from-bracket"></i> Sair
          </a>
      </nav>

      <main class="main-content">
          <div class="welcome-banner">
              <div class="welcome-text">
                  <h1>Relatórios do Sistema</h1>
                  <p>Acompanhe os resultados e status gerais dos chamados.</p>
              </div>
              <div class="welcome-icon">
                  <i class="fa-solid fa-chart-pie"></i>
              </div>
          </div>

          <div class="stats-grid-modern" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
              <div class="stat-card-modern" style="border-left-color: #3b82f6;">
                  <div class="stat-card-icon" style="color: #3b82f6; background: rgba(59,130,246,0.1);">
                      <i class="fa-solid fa-cubes"></i>
                  </div>
                  <div class="stat-card-details">
                      <div class="stat-value" id="repTotal">0</div>
                      <div class="stat-label">Total de Tickets</div>
                  </div>
              </div>

              <div class="stat-card-modern" style="border-left-color: #ef4444;">
                  <div class="stat-card-icon" style="color: #ef4444; background: rgba(239,68,68,0.1);">
                      <i class="fa-solid fa-clock"></i>
                  </div>
                  <div class="stat-card-details">
                      <div class="stat-value" id="repAguardando">0</div>
                      <div class="stat-label">Aguardando</div>
                  </div>
              </div>

              <div class="stat-card-modern pending-tickets">
                  <div class="stat-card-icon">
                      <i class="fa-solid fa-spinner fa-spin-slow"></i>
                  </div>
                  <div class="stat-card-details">
                      <div class="stat-value" id="repEmAtendimento">0</div>
                      <div class="stat-label">Em Atendimento</div>
                  </div>
              </div>

              <div class="stat-card-modern" style="border-left-color: #10b981;">
                  <div class="stat-card-icon" style="color: #10b981; background: rgba(16,185,129,0.1);">
                      <i class="fa-solid fa-check-circle"></i>
                  </div>
                  <div class="stat-card-details">
                      <div class="stat-value" id="repConcluido">0</div>
                      <div class="stat-label">Concluídos</div>
                  </div>
              </div>
          </div>
          
          <div class="reports-charts" style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 30px;">
              <div class="chart-container" style="flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                  <h3 style="margin-bottom: 15px; color: #333;">Atendimentos por Status</h3>
                  <canvas id="statusChart"></canvas>
              </div>
              <div class="chart-container" style="flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                  <h3 style="margin-bottom: 15px; color: #333;">Chamados por Cliente</h3>
                  <canvas id="clienteChart"></canvas>
              </div>
          </div>

          <script>
              document.addEventListener('DOMContentLoaded', () => {
                  fetch('/api/reports')
                      .then(res => res.json())
                      .then(data => {
                          if(!data.error) {
                              document.getElementById('repTotal').textContent = data.total;
                              document.getElementById('repAguardando').textContent = data.aguardando;
                              document.getElementById('repEmAtendimento').textContent = data.em_atendimento;
                              document.getElementById('repConcluido').textContent = data.concluido;
                              
                              // Status Chart
                              const ctxStatus = document.getElementById('statusChart').getContext('2d');
                              new Chart(ctxStatus, {
                                  type: 'pie',
                                  data: {
                                      labels: data.tickets_por_status.map(s => s.status),
                                      datasets: [{
                                          data: data.tickets_por_status.map(s => s.count),
                                          backgroundColor: ['#ef4444', '#3b82f6', '#10b981']
                                      }]
                                  }
                              });

                              // Cliente Chart
                              const ctxCliente = document.getElementById('clienteChart').getContext('2d');
                              new Chart(ctxCliente, {
                                  type: 'bar',
                                  data: {
                                      labels: data.tickets_por_cliente.map(c => c.cliente),
                                      datasets: [{
                                          label: 'Total de Chamados',
                                          data: data.tickets_por_cliente.map(c => c.count),
                                          backgroundColor: '#3b82f6'
                                      }]
                                  },
                                  options: {
                                      scales: {
                                          y: { beginAtZero: true, ticks: { stepSize: 1 } }
                                      }
                                  }
                              });
                          }
                      })
                      .catch(err => console.error(err));
              });
          </script>
      </main>

      <!-- Reusing modal for ticket -->
      <div id="modalAbrirTicket" class="modal-overlay oculto">
          <div class="modal-card">
              <h2 class="modal-title">Abrir Ticket</h2>
              <form onsubmit="salvarNovoTicket(event)">
                  <div class="input-group">
                      <label class="modal-label">Título</label>
                      <input type="text" id="novoTicketTitulo" class="modal-input" placeholder="Insira o seu principal problema..." required>
                  </div>
                  <div class="input-group">
                      <label class="modal-label">Descrição</label>
                      <textarea id="novoTicketDescricao" class="modal-textarea" rows="6" placeholder="Descreva seu problema aqui..." required></textarea>
                  </div>
                  <div class="modal-actions">
                      <button type="button" class="btn-cancelar" onclick="fecharModalTicket()">Cancelar</button>
                      <button type="submit" class="btn-confirmar">Abrir Ticket</button>
                  </div>
              </form>
          </div>
      </div>
      
  </div>
</body>
</html>
