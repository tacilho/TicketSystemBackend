<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketSystem Tickets</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='tickets.css')}}">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script src="{{ url_for('static', filename='tickets.js') }}"></script>
    <script src="{{ url_for('static', filename='pageManager.js') }}"></script>

</head>
<body style="background-color: #f5f5f5;">
    <div class="layout-container">
        
        <nav class="sidebar-modern">
            <div class="brand-area-modern">
                <i class="fa-solid fa-tags logo-icon"></i>
                <div class="brand-text-container">
                    <div class="brand-title"><strong>Ticket</strong>System</div>
                    <div class="brand-subtitle">Administrator</div>
                </div>
                <button class="btn-toggle-sidebar" onclick="toggleSidebar()" title="Recolher Menu">
                    <i class="fa-solid fa-chevron-left" id="toggleIcon"></i>
                </button>
            </div>

            <div class="nav-links">
                <a href="{{ url_for('home') }}" class="nav-item-modern" data-nivel="operator">
                    <i class="fa-solid fa-border-all"></i> Home
                </a>
                <a href="{{ url_for('tickets') }}" class="nav-item-modern active">
                    <i class="fa-solid fa-ticket-alt"></i> Tickets
                </a>
                <a href="{{ url_for('relatorios') }}" class="nav-item-modern" data-nivel="operator">
                    <i class="fa-solid fa-chart-line"></i> Relatórios
                </a>

                <a href="/logout" class="btn-logout-sidebar">
                    <i class="fa-solid fa-right-from-bracket"></i> Sair
                </a>
            </div>
        </nav>

        <main class="main-content-modern">
            
            <div class="top-banner-green">
                <h2>Tickets <i class="fa-solid fa-ticket"></i></h2>
            </div>
            
            <div class="client-header oculto" id="headerCliente">
                <button class="btn-green" onclick="abrirTicket()">Abrir Ticket</button>
                <button class="btn-profile"> 
                    <i class="fa-regular fa-user-circle"></i>
                </button>
            </div>

            <div id="noTicketsMessage" class="oculto" style="display: flex; flex: 1; justify-content: center; align-items: center; color: #666; font-weight: 500; font-size: 1.1rem; height: calc(100vh - 100px);">
                Você não possui nenhum Ticket
            </div>

            <div class="workspace-split" id="workspaceSplit">
                
                <div class="left-panel">
                    <div class="tabs-container" data-nivel="operator">
                        <button class="tab-btn active" id="btnAguardando" onclick="mudarAba('aguardando')">Aguardando</button>
                        <button class="tab-btn" id="btnAtendimento" onclick="mudarAba('em_atendimento')">Em atendimento</button>
                        <button class="tab-btn" id="btnConcluido" onclick="mudarAba('concluido')">Concluídos</button>
                    </div>

                    <div class="ticket-list" id="ticketList"></div>
                </div>

                <div class="vertical-divider"></div>

                <div class="right-panel">
                    <div class="ticket-details-card" id="ticketDetailsView" style="display: none;">
                        <div class="details-header">
                            <div>
                                <h3 id="detalheTitulo" class="detalhe-titulo">Título #000</h3>
                            </div>
                            <div id="detalheCliente" class="detalhe-cliente">Nome do Solicitante</div>
                        </div>

                        <!-- Compact Description -->
                        <div class="details-body-compact">
                            <textarea id="detalheDescricao" class="descricao-box-compact" readonly></textarea>
                        </div>

                        <!-- Chat Section -->
                        <div class="chat-section">
                            <h4 class="chat-title"><i class="fa-solid fa-comments"></i> Mensagens</h4>
                            <div id="chatFeed" class="chat-feed">
                            <!-- Mensagens dinâmicas -->
                            </div>
                        
                            <!-- Banner de ticket fechado -->
                            <div id="chatBlockedBanner" class="oculto" style="background-color: #fff3cd; color: #856404; padding: 12px; text-align: center; border-radius: 8px; font-weight: 500; margin-bottom: 15px; border: 1px solid #ffeeba; display: flex; align-items: center; justify-content: center; gap: 8px;">
                                <i class="fa-solid fa-lock"></i> Este ticket foi concluído. O envio de mensagens está bloqueado.
                            </div>
                            
                            <form id="chatForm" onsubmit="enviarMensagem(event)" class="chat-input-area" enctype="multipart/form-data">
                                <div class="chat-input-row">
                                    <input type="text" id="chatInput" class="chat-input" placeholder="Escreva uma mensagem..." required autocomplete="off">
                                    
                                    <label for="chatAttach" class="btn-attach" title="Anexar Foto">
                                        <i class="fa-solid fa-paperclip"></i>
                                        <input type="file" id="chatAttach" accept="image/*" style="display: none;" onchange="verificarAnexo()">
                                    </label>
                                    
                                    <button type="submit" class="btn-send-message" title="Enviar Mensagem">
                                        <i class="fa-solid fa-paper-plane"></i>
                                    </button>
                                </div>
                                <div id="previewAttach" class="preview-attach oculto">
                                    <span class="preview-name" id="previewFilename">Foto.png</span>
                                    <button type="button" class="btn-remove-attach" onclick="removerAnexo()"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                            </form>
                        </div>

                        <div class="details-footer" id="detailsFooter"></div>
                    </div>
                    
                    <div id="emptyState" class="empty-state">
                        <i class="fa-solid fa-hand-pointer"></i>
                        <p>Selecione um ticket ao lado para visualizar os detalhes.</p>
                    </div>
                </div>
            </div>
        </main>

        

        <div id="modalAbrirTicket" class="modal-overlay oculto">
            <div class="modal-card">
                <h2 class="modal-title">Abrir Ticket</h2>
                
                <form onsubmit="salvarNovoTicket(event)">
                    <div class="input-group">
                        <label class="modal-label">Título</label>
                        <input type="text" id="novoTicketTitulo" class="modal-input" placeholder="Insira o seu principal problema..." required>
                    </div>
                    
                    <div class="input-group">
                        <label class="modal-label">Descrição</label>
                        <textarea id="novoTicketDescricao" class="modal-textarea" rows="6" placeholder="Descreva seu problema aqui..." required></textarea>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn-cancelar" onclick="fecharModalTicket()">Cancelar</button>
                        <button type="submit" class="btn-confirmar">Abrir Ticket</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</body>
</html>
