<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketSystem - Login</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
  <link rel="stylesheet" href="{{url_for('static', filename='loginstyles.css' )}}">

    <script src="{{ url_for('static' , filename='login.js')}}"></script>
    
</head>
<body class="login-body">

    <div class="login-card">
        
        <div class="logo-section">
            <i class="fa-solid fa-tags logo-icon"></i>
            <div class="logo-text">
                <div class="logo-title"><strong>Ticket</strong>System</div>
                <div class="logo-subtitle">Administrator</div>
            </div>
        </div>

        <h4 class="login-heading">Login</h4>

    <!--Esse linha vai enviar os dados para a login-->
        <form method="POST" action="/login">
            <div class="input-group">
                <label class="input-label">Usuário:</label>
                <input type="text" class="custom-input" name="login" placeholder="Insira seu usuário..." required>
            </div>

            <div class="input-group group-spaced">
                <label class="input-label">Senha:</label>
                <input type="password" class="custom-input" name='senha' placeholder="Insira sua senha..." required>
            </div>

            <div class="button-container">
                <button type="submit" class="btn-submit">Entrar</button>
            </div>

            <div class="input-group group-spaced">
                <a onclick="showPasswordReset()" class="footer-link">Esqueci minha senha</a>
            </div>

        </form>
    </div>


   <div class="oculto" id="password-reset">
        <div class="password-overlay">
            
            <div class="password-card" style="text-align: center;">
                
                <h3 class="login-heading" style="margin-bottom: 10px;">Insira seu e-mail</h3>
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 25px;">Iremos verificar se seu e-mail consta<br>em nossa base de dados</p>

                <form>
                    <div class="input-group" style="text-align: left;">
                        <input id="e-mail" type="email" class="custom-input" placeholder="Insira seu e-mail..." style="background-color: #f5f5f5; border: none;" required>
                    </div>

                    <div class="button-container" style="gap: 15px; margin-top: 10px; margin-bottom: 0;">
                        <button onclick="checkEmail()" class="btn-submit" style="background-color: #ffc107; color: #fff; width: 100%;">Verificar e-mail</button>
                    </div>
                        
                    <div style="margin-top: 15px;">
                        <a href="#" onclick="closePasswordReset()" class="footer-link" style="color: #666;">Voltar ao Login</a>
                    </div>
                </form>
                
            </div>

        </div>
    </div>

    <div class="oculto" id="reset-modal-overlay">
    
        <div class="reset-modal-box">
            <h2 class="reset-modal-title">Redefina sua Senha</h2>
        
            <form>
                <div class="reset-input-group">
                    <label for="nova_senha">Insira sua nova senha:</label>
                    <input type="password" id="nova_senha" name="nova_senha" placeholder="Insira sua nova senha..." required>
                </div>
            
                <div class="reset-input-group">
                    <label for="confirma_senha">Confirme sua nova senha:</label>
                    <input type="password" id="confirma_senha" name="confirma_senha" placeholder="Confirme a sua senha..." required>
                </div>
            
                <button onclick="passwordReset()" class="btn-alterar-senha">Alterar senha</button>

                <div style="margin-top: 15px;">
                        <a href="#" onclick="closePasswordReset()" class="footer-link" style="color: #666;">Voltar ao Login</a>
                </div>
            </form>
        </div>
    
    </div>
</body>
</html>
